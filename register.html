<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Regisztráció – MindEarn</title>
  <meta name="description" content="Hozz létre MindEarn fiókot.">
  <link rel="manifest" href="site.webmanifest">
  <link rel="icon" href="assets/keptar/mindearn-logo-transparent-no1-javitott-alpha.png">
  <style>
    :root {
      --ink: #191611;
      --text: #332b20;
      --muted: #746b5e;
      --line: #e8ddc8;
      --line-strong: #d6c19b;
      --paper: #fbf7ef;
      --panel: #ffffff;
      --jade: #168f78;
      --jade-soft: #e5f5ef;
      --shadow: 0 18px 46px rgba(65, 48, 25, 0.11);
      --radius: 8px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.5), transparent 32rem),
        radial-gradient(circle at 8% 2%, rgba(216, 182, 111, 0.22), transparent 30rem),
        radial-gradient(circle at 92% 0%, rgba(22, 143, 120, 0.10), transparent 28rem),
        var(--paper);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.5;
      padding: 20px;
    }

    a { color: inherit; text-decoration: none; }
    button, input { font: inherit; }

    a:focus-visible, button:focus-visible, input:focus-visible {
      outline: 3px solid rgba(22, 143, 120, 0.24);
      outline-offset: 3px;
    }

    .auth-card {
      width: 100%;
      max-width: 420px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: clamp(28px, 5vw, 44px);
      box-shadow: var(--shadow);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 28px;
    }

    .brand img { width: 44px; }
    .brand b { display: block; color: var(--ink); letter-spacing: 0.03em; }
    .brand span { display: block; color: var(--muted); font-size: 0.8rem; }

    h1 {
      margin: 0 0 6px;
      color: var(--ink);
      font-size: 1.6rem;
      letter-spacing: -0.03em;
    }

    .sub {
      margin: 0 0 26px;
      color: var(--muted);
      font-size: 0.92rem;
    }

    .field { margin-bottom: 14px; }

    label {
      display: block;
      font-weight: 760;
      font-size: 0.88rem;
      color: var(--ink);
      margin-bottom: 6px;
    }

    input {
      width: 100%;
      padding: 10px 13px;
      border: 1px solid var(--line-strong);
      border-radius: var(--radius);
      background: var(--paper);
      color: var(--text);
      font-size: 0.95rem;
    }

    input:focus {
      outline: none;
      border-color: var(--jade);
      box-shadow: 0 0 0 3px rgba(22, 143, 120, 0.12);
    }

    .btn {
      width: 100%;
      min-height: 42px;
      margin-top: 8px;
      border-radius: 7px;
      padding: 10px 16px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid transparent;
      font-weight: 850;
      cursor: pointer;
      font-size: 0.95rem;
      background: linear-gradient(180deg, #9fb5a8, #6f8f83);
      color: #fbf8f1;
      box-shadow: 0 12px 24px rgba(111, 143, 131, 0.22);
    }

    .btn:disabled { opacity: 0.6; cursor: not-allowed; }

    .status {
      min-height: 20px;
      margin: 10px 0 0;
      font-size: 0.88rem;
    }

    .status.error { color: #c0392b; }
    .status.ok { color: var(--jade); }

    .confirm-message {
      text-align: center;
      padding: 20px 0 8px;
    }

    .confirm-message .icon {
      font-size: 2.4rem;
      margin-bottom: 12px;
    }

    .confirm-message h2 {
      margin: 0 0 10px;
      color: var(--ink);
      font-size: 1.3rem;
      letter-spacing: -0.02em;
    }

    .confirm-message p {
      margin: 0;
      color: var(--muted);
      font-size: 0.92rem;
    }

    .footer-links {
      margin-top: 22px;
      text-align: center;
      font-size: 0.9rem;
      color: var(--muted);
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .footer-links a { color: var(--jade); font-weight: 760; }
  </style>
</head>
<body>
  <div class="auth-card">
    <a class="brand" href="index.html">
      <img src="assets/keptar/mindearn-logo-transparent-no1-javitott-alpha.png" alt="MindEarn logó">
      <span>
        <b>MindEarn</b>
        <span>Teremteni – Alkotni – Adni</span>
      </span>
    </a>

    <div id="formSection">
      <h1>Regisztráció</h1>
      <p class="sub">Hozz létre MindEarn fiókot.</p>

      <form id="registerForm" novalidate>
        <div class="field">
          <label for="lastName">Vezetéknév</label>
          <input type="text" id="lastName" name="lastName" autocomplete="family-name" required placeholder="Pl. Jámbor">
        </div>
        <div class="field">
          <label for="firstName">Keresztnév</label>
          <input type="text" id="firstName" name="firstName" autocomplete="given-name" required placeholder="Pl. Sándor">
        </div>
        <div class="field">
          <label for="email">Email-cím</label>
          <input type="email" id="email" name="email" autocomplete="email" required placeholder="te@pelda.hu">
        </div>
        <div class="field">
          <label for="password">Jelszó</label>
          <input type="password" id="password" name="password" autocomplete="new-password" required placeholder="Minimum 6 karakter">
        </div>
        <p class="status" id="registerStatus" role="alert"></p>
        <button class="btn" type="submit" id="registerBtn">Fiók létrehozása</button>
      </form>

      <div class="footer-links">
        <span>Van már fiókod? <a href="login.html">Bejelentkezés</a></span>
        <a href="index.html">← Vissza a főoldalra</a>
      </div>
    </div>

    <div id="confirmSection" hidden>
      <div class="confirm-message">
        <div class="icon">✉</div>
        <h2>Erősítsd meg az email-cím!</h2>
        <p>Küldtünk egy megerősítő levelet. Kattints a levélben lévő linkre a fiókod aktiválásához.</p>
      </div>
      <div class="footer-links">
        <a href="login.html">Bejelentkezés</a>
        <a href="index.html">← Vissza a főoldalra</a>
      </div>
    </div>
  </div>

  <script type="module">
    import { supabase } from './src/lib/supabase.js';

    // Redirect to dashboard if session already exists
    supabase.auth.getSession().then(({ data: { session } }) => {
      if (session) window.location.replace('dashboard.html');
    });

    const form = document.getElementById('registerForm');
    const statusEl = document.getElementById('registerStatus');
    const btn = document.getElementById('registerBtn');
    const formSection = document.getElementById('formSection');
    const confirmSection = document.getElementById('confirmSection');

    const errorMessages = {
      'User already registered': 'Ezt az email-cím már regisztrálták. <a href="login.html">Bejelentkezés</a>',
    };

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const firstName = form.firstName.value.trim();
      const lastName  = form.lastName.value.trim();
      const email     = form.email.value.trim();
      const password  = form.password.value;

      btn.disabled = true;
      statusEl.textContent = '';
      statusEl.className = 'status';

      const { data, error } = await supabase.auth.signUp({
        email,
        password,
        options: {
          data: {
            first_name: firstName || undefined,
            last_name:  lastName  || undefined,
            name: (firstName && lastName) ? `${lastName} ${firstName}` : (lastName || firstName || undefined),
          },
        },
      });

      if (error) {
        statusEl.innerHTML = errorMessages[error.message] || 'Hiba történt. Kérjük, próbáld újra.';
        statusEl.className = 'status error';
        btn.disabled = false;
        return;
      }

      if (data.session) {
        // Email confirmation disabled — immediately logged in
        window.location.href = 'dashboard.html';
      } else {
        // Email confirmation required — show confirmation message
        formSection.hidden = true;
        confirmSection.hidden = false;
      }
    });
  </script>
</body>
</html>
