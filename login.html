<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bejelentkezés – MindEarn</title>
  <meta name="description" content="Jelentkezz be a MindEarn platformra.">
  <link rel="manifest" href="site.webmanifest">
  <link rel="icon" href="assets/keptar/mindearn-logo-transparent-no1-javitott-alpha.png">
  <style>
    :root {
      --ink: #191611;
      --text: #332b20;
      --muted: #746b5e;
      --line: #e8ddc8;
      --line-strong: #d6c19b;
      --paper: #fbf7ef;
      --panel: #ffffff;
      --jade: #168f78;
      --jade-soft: #e5f5ef;
      --shadow: 0 18px 46px rgba(65, 48, 25, 0.11);
      --radius: 8px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.5), transparent 32rem),
        radial-gradient(circle at 8% 2%, rgba(216, 182, 111, 0.22), transparent 30rem),
        radial-gradient(circle at 92% 0%, rgba(22, 143, 120, 0.10), transparent 28rem),
        var(--paper);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.5;
      padding: 20px;
    }

    a { color: inherit; text-decoration: none; }
    button, input { font: inherit; }

    a:focus-visible, button:focus-visible, input:focus-visible {
      outline: 3px solid rgba(22, 143, 120, 0.24);
      outline-offset: 3px;
    }

    .auth-card {
      width: 100%;
      max-width: 420px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: clamp(28px, 5vw, 44px);
      box-shadow: var(--shadow);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 28px;
    }

    .brand img { width: 44px; }
    .brand b { display: block; color: var(--ink); letter-spacing: 0.03em; }
    .brand span { display: block; color: var(--muted); font-size: 0.8rem; }

    h1 {
      margin: 0 0 6px;
      color: var(--ink);
      font-size: 1.6rem;
      letter-spacing: -0.03em;
    }

    .sub {
      margin: 0 0 26px;
      color: var(--muted);
      font-size: 0.92rem;
    }

    .field { margin-bottom: 14px; }

    label {
      display: block;
      font-weight: 760;
      font-size: 0.88rem;
      color: var(--ink);
      margin-bottom: 6px;
    }

    input {
      width: 100%;
      padding: 10px 13px;
      border: 1px solid var(--line-strong);
      border-radius: var(--radius);
      background: var(--paper);
      color: var(--text);
      font-size: 0.95rem;
    }

    input:focus {
      outline: none;
      border-color: var(--jade);
      box-shadow: 0 0 0 3px rgba(22, 143, 120, 0.12);
    }

    .btn {
      width: 100%;
      min-height: 42px;
      margin-top: 8px;
      border-radius: 7px;
      padding: 10px 16px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid transparent;
      font-weight: 850;
      cursor: pointer;
      font-size: 0.95rem;
      background: linear-gradient(180deg, #9fb5a8, #6f8f83);
      color: #fbf8f1;
      box-shadow: 0 12px 24px rgba(111, 143, 131, 0.22);
    }

    .btn:disabled { opacity: 0.6; cursor: not-allowed; }

    .status {
      min-height: 20px;
      margin: 10px 0 0;
      font-size: 0.88rem;
    }

    .status.error { color: #c0392b; }
    .status.ok { color: var(--jade); }

    .footer-links {
      margin-top: 22px;
      text-align: center;
      font-size: 0.9rem;
      color: var(--muted);
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .footer-links a { color: var(--jade); font-weight: 760; }
  </style>
</head>
<body>
  <div class="auth-card">
    <a class="brand" href="index.html">
      <img src="assets/keptar/mindearn-logo-transparent-no1-javitott-alpha.png" alt="MindEarn logó">
      <span>
        <b>MindEarn</b>
        <span>Teremteni – Alkotni – Adni</span>
      </span>
    </a>

    <h1>Bejelentkezés</h1>
    <p class="sub">Lépj be a MindEarn fiókodba.</p>

    <form id="loginForm" novalidate>
      <div class="field">
        <label for="email">Email-cím</label>
        <input type="email" id="email" name="email" autocomplete="email" required placeholder="te@pelda.hu">
      </div>
      <div class="field">
        <label for="password">Jelszó</label>
        <input type="password" id="password" name="password" autocomplete="current-password" required placeholder="••••••••">
      </div>
      <p class="status" id="loginStatus" role="alert"></p>
      <button class="btn" type="submit" id="loginBtn">Belépés</button>
    </form>

    <div class="footer-links">
      <span>Még nincs fiókod? <a href="register.html">Regisztráció</a></span>
      <a href="index.html">← Vissza a főoldalra</a>
    </div>
  </div>

  <script type="module">
    import { supabase } from './src/lib/supabase.js';

    // Redirect to dashboard if session already exists
    supabase.auth.getSession().then(({ data: { session } }) => {
      if (session) window.location.replace('dashboard.html');
    });

    const form = document.getElementById('loginForm');
    const statusEl = document.getElementById('loginStatus');
    const btn = document.getElementById('loginBtn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = form.email.value.trim();
      const password = form.password.value;

      btn.disabled = true;
      statusEl.textContent = '';
      statusEl.className = 'status';

      const { error } = await supabase.auth.signInWithPassword({ email, password });

      if (error) {
        statusEl.textContent = 'Hibás email-cím vagy jelszó.';
        statusEl.className = 'status error';
        btn.disabled = false;
        return;
      }

      window.location.href = 'dashboard.html';
    });
  </script>
</body>
</html>
